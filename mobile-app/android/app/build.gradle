apply plugin: 'com.android.application'
apply plugin: 'com.chaquo.python'

android {
    namespace "com.dupley.tgwssproxy"
    compileSdk libs.versions.compileSdk.get().toInteger()

    defaultConfig {
        applicationId "com.dupley.tgwssproxy"
        minSdkVersion libs.versions.minSdk.get().toInteger()
        targetSdkVersion libs.versions.targetSdk.get().toInteger()
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }

        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }

        python {
            version "3.11"
            pip {
                install "cryptography"
                install "psutil"
                install "appdirs"
                install "zeroconf"
            }
            staticProxy = true
            pyc {
                src false
                pip true
            }
            // Optimization for Cycle 6
            extractPackages "cryptography", "psutil", "zeroconf"
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main {
            python {
                srcDirs = ["src/main/python", "../../../proxy"]
            }
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar', '*.aar'], dir: 'libs')
    implementation fileTree(include: ['*.jar', '*.aar'], dir: '../capacitor-cordova-android-plugins/src/main/libs')
    
    implementation libs.androidx.appcompat
    implementation libs.androidx.coordinatorlayout
    implementation libs.androidx.core.splashscreen
    implementation libs.androidx.security.crypto
    implementation libs.androidx.work.runtime
    implementation libs.androidx.biometric
    
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')

    testImplementation libs.junit
    androidTestImplementation libs.androidx.junit
    androidTestImplementation libs.androidx.espresso.core
    
    debugImplementation libs.leakcanary
    implementation libs.google.generativeai
}

apply from: 'capacitor.build.gradle'
