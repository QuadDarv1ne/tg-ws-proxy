name: Build & Release

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Create Github Release?'
        type: boolean
        required: true
        default: false
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: false
        default: "v1.0.0"
      build_windows:
        description: 'Build Windows executable?'
        type: boolean
        required: true
        default: true
      build_macos:
        description: 'Build macOS application?'
        type: boolean
        required: true
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    if: ${{ github.event.inputs.build_windows == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pyinstaller
        run: pip install "pyinstaller==6.13.0"

      - name: Build EXE with PyInstaller
        run: pyinstaller packaging/windows.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy-win
          path: dist/TgWsProxy.exe

  build-win7:
    runs-on: windows-latest
    if: ${{ github.event.inputs.build_windows == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.8 (last version supporting Win7)
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: "pip"

      - name: Install dependencies (Win7-compatible)
        run: pip install -r requirements-win7.txt

      - name: Install pyinstaller
        run: pip install "pyinstaller==5.13.2"

      - name: Build EXE with PyInstaller (Win7)
        run: pyinstaller packaging/windows.spec --noconfirm

      - name: Rename artifact
        run: mv dist/TgWsProxy.exe dist/TgWsProxy-win7.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy-win7
          path: dist/TgWsProxy-win7.exe

  build-macos:
    runs-on: macos-latest
    if: ${{ github.event.inputs.build_macos == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install rumps

      - name: Install pyinstaller
        run: pip install "pyinstaller==6.13.0"

      - name: Build macOS app with PyInstaller
        run: pyinstaller packaging/macos.spec --noconfirm

      - name: Create DMG
        run: |
          mkdir -p dist/TgWsProxy.app/Contents/MacOS
          hdiutil create -volname "TG WS Proxy" -srcfolder dist/TgWsProxy.app -ov -format UDZO TgWsProxy.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy-macOS
          path: TgWsProxy.dmg

  release:
    needs: [build-windows, build-win7, build-macos]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.make_release == 'true' }}
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: TgWsProxy-win
          path: dist

      - name: Download Win7 build
        uses: actions/download-artifact@v4
        with:
          name: TgWsProxy-win7
          path: dist

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: TgWsProxy-macOS
          path: dist
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "TG WS Proxy ${{ github.event.inputs.version }}"
          body: |
            ## TG WS Proxy ${{ github.event.inputs.version }}
            
            ### Downloads
            - **Windows**: `TgWsProxy.exe`
            - **Windows 7**: `TgWsProxy-win7.exe`
            - **macOS**: `TgWsProxy.dmg` (Universal)
          files: |
            dist/TgWsProxy.exe
            dist/TgWsProxy-win7.exe
            dist/TgWsProxy.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}